name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build package
        run: uv build

      - name: Verify distributions
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  post-release-checks:
    needs: pypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install released package from PyPI
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          python -m venv /tmp/pypi-check
          source /tmp/pypi-check/bin/activate
          python -m pip install --upgrade pip
          for i in {1..12}; do
            if python -m pip install "transformers-knn-adapter==${VERSION}"; then
              break
            fi
            if [[ "$i" -eq 12 ]]; then
              echo "Failed to install transformers-knn-adapter==${VERSION} from PyPI after retries."
              exit 1
            fi
            echo "PyPI release not visible yet (attempt $i/12). Retrying in 20s..."
            sleep 20
          done

      - name: Run post-release inference smoke script
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/pypi-check/bin/activate
          python scripts/pypi_inference_smoke.py
