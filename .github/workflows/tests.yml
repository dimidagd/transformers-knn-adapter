name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: .uv-cache
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: .uv-cache
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run mypy
        run: uv run mypy

  pytest:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: .uv-cache
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest --cov=transformers_knn_adapter --cov-report=term-missing --cov-fail-under=60

      - name: Run dogfaces smoke integration test
        env:
          RUN_DOGFACES_SMOKE_INTEGRATION: "1"
        run: |
          uv run --with accelerate --with pytorch-metric-learning \
            pytest tests/test_dogfaces_smoke_integration.py -q

  build:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: .uv-cache
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv downloads
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --dev

      - name: Build wheel
        run: uv build --wheel

      - name: Install smoke test
        run: |
          uv venv --clear /tmp/install-smoke
          uv pip install --python /tmp/install-smoke/bin/python dist/*.whl
          /tmp/install-smoke/bin/python -c "import transformers_knn_adapter; print('install-ok')"
